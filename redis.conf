# Redis configuration for Celery broker
# =====================================

# Network
bind 0.0.0.0
port 16739

# Authentication
requirepass GXbTpahEVuY3gj2w

# Persistence (keep data across Redis restarts)
appendonly yes
appendfsync everysec

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Connections
timeout 300
tcp-keepalive 60

# Disable saving to RDB (we use AOF)
save ""

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128
